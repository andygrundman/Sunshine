---
name: CI-macOS
permissions: {}

on:
  workflow_call:
    inputs:
      release_commit:
        required: true
        type: string
      release_version:
        required: true
        type: string
    secrets:
      CODESIGN_IDENTITY:
        required: false

env:
  BRANCH: ${{ github.head_ref || github.ref_name }}
  BUILD_VERSION: ${{ inputs.release_version }}
  COMMIT: ${{ inputs.release_commit }}

jobs:
  build_dmg:
    name: ${{ matrix.os_name }}-${{ matrix.os_version }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os_name }}-${{ matrix.os_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
          # while GitHub has larger macOS runners, they are not available for our repos :(
          - os_name: "macos"
            os_version: "14"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
         submodules: recursive

      - name: Setup Dependencies macOS
        timeout-minutes: 5
        run: |
          brew install \
            cmake \
            node \
            pkgconf \
            icu4c@78 \
            miniupnpc \
            openssl@3 \
            opus

          # install gcvor
          python -m pip install gcovr

      - name: Configure
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          set -e
          cd "${GITHUB_WORKSPACE}"

          mkdir -p build
          cmake \
            -B build \
            -S . \
            -DBUILD_DOCS=OFF \
            -DBUILD_TESTS=ON \
            -DBUILD_WERROR=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3 2>/dev/null) \
            -DOpus_ROOT_DIR=$(brew --prefix opus 2>/dev/null) \
            -DSUNSHINE_BUILD_HOMEBREW=OFF \
            -DSUNSHINE_ENABLE_TRAY=ON \
            -DSUNSHINE_PUBLISHER_NAME="${GITHUB_REPOSITORY_OWNER}" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://app.lizardbyte.dev" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://app.lizardbyte.dev/support" \
            -DSUNSHINE_BUNDLE_IDENTIFIER=dev.lizardbyte.sunshine \
            -DCODESIGN_IDENTITY="${CODESIGN_IDENTITY}"

      - name: Build
        run: |
          set -e
          cd "${GITHUB_WORKSPACE}"

          cmake --build build -j $(sysctl -n hw.ncpu)

      - name: Package DMG
        run: |
          set -e
          cd "${GITHUB_WORKSPACE}"

          cpack -G DragNDrop --config build/CPackConfig.cmake --verbose
          if [[ -n "${CODESIGN_IDENTITY}" ]]; then
            xcrun notarytool submit build/cpack_artifacts/Sunshine.dmg --keychain-profile "notarytool-password" --wait
            xcrun stapler staple -v build/cpack_artifacts/Sunshine.dmg
          fi

          mkdir -p artifacts
          mv build/cpack_artifacts/Sunshine.dmg \
            artifacts/Sunshine-macOS-arm64.dmg

      - name: Test
        id: test
        run: |
          set -e
          cd "${GITHUB_WORKSPACE}/build/tests"

          ./test_sunshine --gtest_color=yes --gtest_output=xml:test_results.xml

      - name: Generate gcov report
        id: test_report
        # any except canceled or skipped
        if: >-
          always() &&
          (steps.test.outcome == 'success' || steps.test.outcome == 'failure')
        run: |
          cd "${GITHUB_WORKSPACE}/build"
          python -m gcovr . -r ../src \
            --exclude-noncode-lines \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --verbose \
            --xml-pretty \
            -o coverage.xml

      - name: Upload coverage artifact
        if: >-
          always() &&
          (steps.test_report.outcome == 'success')
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: coverage-macOS-arm64
          path: |
            build/coverage.xml
            build/tests/test_results.xml
          if-no-files-found: error

      - name: Upload Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: build-macOS-arm64
          path: artifacts/
          if-no-files-found: error
