---
name: CI-macOS
permissions: {}

on:
  workflow_call:
    inputs:
      release_commit:
        required: true
        type: string
      release_version:
        required: true
        type: string
    secrets:
      CODESIGN_IDENTITY:
        required: false

env:
  BRANCH: ${{ github.head_ref || github.ref_name }}
  BUILD_VERSION: ${{ inputs.release_version }}
  COMMIT: ${{ inputs.release_commit }}

jobs:
  build_dmg:
    name: ${{ matrix.os_name }}-${{ matrix.os_version }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os_name }}-${{ matrix.os_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
          # while GitHub has larger macOS runners, they are not available for our repos :(
          - os_name: "macos"
            os_version: "14"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
         submodules: recursive

      - name: Setup Dependencies macOS
        timeout-minutes: 5
        run: |
          # create the artifacts directory
          mkdir -p artifacts

          brew install \
            cmake \
            node \
            pkgconf \
            icu4c@78 \
            miniupnpc \
            openssl@3 \
            opus

      - name: Configure formula
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          echo "=== cmake prep"
          args=(--skip-docs --step=cmake)

          if [[ "${CODESIGN_IDENTITY}" == "" ]]; then
            args+=(--skip-codesign)
          else
            args+=(--notarize)
          fi

          echo "scripts/macos_build.sh ${args[@]}"
          scripts/macos_build.sh "${args[@]}"

          echo "=== openssl include ==="
          find /opt/homebrew/opt/openssl@3
          find /opt/homebrew/include/openssl

          echo "=== build.make ==="
          cat build/CMakeFiles/sunshine.dir/build.make

          echo "=== link.txt ==="
          cat build/CMakeFiles/sunshine.dir/link.txt

          echo "=== cmake build"
          cmake --build build -j $(sysctl -n hw.ncpu)

          echo "=== DMG packaging"
          cpack -G DragNDrop --config "${build_dir}/CPackConfig.cmake" --verbose
          if [[ -n "${CODESIGN_IDENTITY}" ]]; then
            xcrun notarytool submit build/cpack_artifacts/Sunshine.dmg --keychain-profile "notarytool-password" --wait
            xcrun stapler staple -v build/cpack_artifacts/Sunshine.dmg
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: build-macOS
          path: build/cpack_artifacts/Sunshine.dmg
          if-no-files-found: error
